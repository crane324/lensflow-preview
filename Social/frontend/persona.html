<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social - 虚拟AI相亲系统 | 数字人生成</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        social: { primary: '#6366f1', secondary: '#8b5cf6', accent: '#ec4899', dark: '#1e1b4b' }
                    }
                }
            }
        }
    </script>
    <style>
        .gradient-text { background: linear-gradient(135deg, #6366f1, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(99,102,241,0.15); }
        .step-active { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
        .step-done { background: #10b981; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity:1; } 50% { opacity:0.5; } }
        .fade-in { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
        textarea:focus, input:focus { outline: none; ring: 2px solid #6366f1; }
        .loading-spinner { border: 3px solid rgba(99,102,241,0.2); border-top-color: #6366f1; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-indigo-50 to-purple-50 min-h-screen">

    <!-- 导航栏 -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-2xl">💕</span>
                <span class="text-xl font-bold gradient-text">Social</span>
                <span class="text-xs text-gray-400 ml-1">v0.1</span>
            </div>
            <div class="text-sm text-gray-500">
                数字人生成
            </div>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="max-w-3xl mx-auto px-4 py-8">

        <!-- 标题 -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">创建你的 AI 数字人</h1>
            <p class="text-gray-500">让 AI 从你的聊天记录中认识你，帮你找到最合拍的那个 TA</p>
        </div>

        <!-- 进度条 -->
        <div class="flex items-center justify-center gap-2 mb-10" id="progressBar">
            <div class="flex items-center">
                <div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-sm font-bold step-active" id="step1Dot">1</div>
                <span class="text-xs text-gray-400 ml-2 hidden sm:inline" id="step1Label">聊天分析</span>
            </div>
            <div class="w-12 h-0.5 bg-gray-200" id="line1"></div>
            <div class="flex items-center">
                <div class="w-8 h-8 rounded-full flex items-center justify-center text-gray-400 bg-gray-100 text-sm font-bold" id="step2Dot">2</div>
                <span class="text-xs text-gray-400 ml-2 hidden sm:inline" id="step2Label">基础信息</span>
            </div>
            <div class="w-12 h-0.5 bg-gray-200" id="line2"></div>
            <div class="flex items-center">
                <div class="w-8 h-8 rounded-full flex items-center justify-center text-gray-400 bg-gray-100 text-sm font-bold" id="step3Dot">3</div>
                <span class="text-xs text-gray-400 ml-2 hidden sm:inline" id="step3Label">个性探索</span>
            </div>
            <div class="w-12 h-0.5 bg-gray-200" id="line3"></div>
            <div class="flex items-center">
                <div class="w-8 h-8 rounded-full flex items-center justify-center text-gray-400 bg-gray-100 text-sm font-bold" id="step4Dot">4</div>
                <span class="text-xs text-gray-400 ml-2 hidden sm:inline" id="step4Label">生成档案</span>
            </div>
        </div>

        <!-- 步骤内容区 -->
        <div id="stepContent" class="fade-in">
            <!-- 动态渲染各步骤 -->
        </div>

        <!-- 加载遮罩 -->
        <div id="loadingOverlay" class="hidden fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-50">
            <div class="bg-white rounded-2xl p-8 text-center shadow-2xl">
                <div class="loading-spinner mx-auto mb-4" style="width:48px;height:48px;border-width:4px;"></div>
                <p class="text-gray-600" id="loadingText">AI 分析中...</p>
            </div>
        </div>

    </div>

    <script src="/js/app.js"></script>
</body>
</html>
